services:
  db:
    image: postgres:15-alpine
    container_name: employee_registry_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: EmployeeRegistryDb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d EmployeeRegistryDb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: employee_registry_backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=EmployeeRegistryDb;Username=postgres;Password=postgrespassword;SSL Mode=Disable;Trust Server Certificate=true
      # Ensure JWT settings are explicitly consistent inside Docker.
      - JwtSettings__SecretKey=ThisIsASuperSecretKeyForEmployeeRegistrySystem@2026!!!
      - JwtSettings__Issuer=EmployeeRegistry
      - JwtSettings__Audience=EmployeeRegistryClient
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/employee-registry-ui
      dockerfile: Dockerfile
    container_name: employee_registry_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
